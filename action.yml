name: "Hello World Action"
description: "Minimal bash action that prints a message"
inputs:
  message:
    description: "Message to print"
    required: false
    default: "Hello, world from custom action!"
runs:
  using: "composite"
  steps:
    - name: Set path
      run: echo "${{ github.action_path }}" >> $GITHUB_PATH
      shell: bash
    - run: entrypoint.sh
      shell: bash
